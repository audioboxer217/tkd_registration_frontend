<div class="col-md-12 center-block" align="center">
  <h1>Entries</h1>
</div>
<div class="table-responsive">
  <table id="entries" class="display table table-striped table-hover dt-responsive">
    <thead>
      <tr>
        <th>Name</th>
        <th>Role</th>
        <th>Gender</th>
        <th>Belt</th>
        <th>Age Group</th>
        <th>Weight Class</th>
        <th>School</th>
        <th>Events</th>
      </tr>
    </thead>
    <tfoot>
      <tr>
        <th>Name</th>
        <th>Role</th>
        <th>Gender</th>
        <th>Belt</th>
        <th>Age Group</th>
        <th>Weight Class</th>
        <th>School</th>
        <th>Events</th>
      </tr>
    </tfoot>
  </table>
</div>
<script>
  $(document).ready(function () {
    var table = $('#entries').DataTable({
      reponsive: true,
      ajax: '/api/v1/entries',
      searchPanes: {
        cascadePanes: true,
        initCollapsed: true,
      },
      columns: [
        {
          targets: 0,
          data: "full_name"
        },
        {
          target: 1,
          data: "reg_type",
          visible: false,
          searchable: true,
          searchPanes: {
            show: true
          }
        },
        {
          target: 2,
          data: "gender",
          defaultContent: "",
          searchable: true,
          searchPanes: {
            show: true
          },
        },
        {
          target: 3,
          data: "belt_rank",
          searchable: true,
          searchPanes: {
            show: true
          },
          render: function (data, type, row) {
            if (!row.belt_rank) {
              return "";
            }
            if (row.belt_rank.includes('black')) {
              return "black";
            }
            return row.belt_rank;
          }
        },
        {
          target: 4,
          data: "age_group",
          defaultContent: "",
          searchable: true,
          searchPanes: {
            show: true
          }
        },
        {
          target: 5,
          data: "weight_class",
          defaultContent: "",
          searchable: true,
          searchPanes: {
            show: true
          },
        },
        {
          target: 6,
          data: "school",
          searchable: true
        },
        {
          target: 7,
          data: "events",
          defaultContent: "",
          searchable: true,
          render: {
            _: '[, ]',
            sp: '[]'
          },
          searchPanes: {
            orthogonal: 'sp'
          }
        }
      ]
    });
    table.searchPanes.container().prependTo(table.table().container());
    table.searchPanes.resizePanes();
  });

</script>
